services:
  vllm-service:
    container_name: vllm_gemma_4_lora
    #image: vllm/vllm-openai:v0.12.0
    image: vllm/vllm-openai:latest
    networks:
      - vllm
    volumes:
            #- $PWD/volume/models/google--gemma-3-27b-it/:/workspace/llm_model
      - $PWD/volume/models/google--gemma-4-31B-it-qat-w4a16-ct/:/workspace/llm_model
        #- $PWD/volume/models/gaunernst--gemma-3-27b-it-int4-awq:/workspace/llm_model
        #- $PWD/volume/models/wingeneai-gemma-3-27b-clean-sft-general-keyqa-paraphrase-20260519_181754:/workspace/chatbot_lora
      - $PWD/volume/models/wingeneai-gemma-4-31b-qat-q4-unquantized-clean-sft-general-keyqa-20260608_073956-fixed:/workspace/chatbot_lora
      - $PWD/volume/models/google--gemma-4-31B-it-qat-q4_0-unquantized-assistant/:/workspace/assistant_model
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
              driver: nvidia
              device_ids: ['0','1']
    environment:
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      LLM_NAME: /workspace/llm_model
    command:
      #      - --quantization 
      #      - awq_marlin
      
      - --dtype
      - bfloat16

      - --kv-cache-dtype
      - fp8

      - --model
      - /workspace/llm_model

      - --tensor-parallel-size
      - "2"

      - --max-model-len
      - "8192"

      - --max-num-batched-tokens
      - "8192"

      - --gpu-memory-utilization
      - "0.90"

      - --max-num-seqs
      - "32"

      - --trust-remote-code
      - --enable-lora
      
      - --max-loras
      - "1"
      
      - --max-lora-rank
      - "32"

      - --lora-modules
      - '{"name": "chatbot_lora", "path": "/workspace/chatbot_lora", "base_model_name": "/workspace/llm_model"}'

      - --speculative-config
      - '{"model": "/workspace/assistant_model", "num_speculative_tokens": 4, "method": "mtp"}'

    ports:
      - "25207:8000"
    restart: unless-stopped

networks:
  vllm:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.100.0/24

